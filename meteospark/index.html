<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset = "UTF-8" />
    <meta name="viewport" content ="width=device-width, initial-scale=1.0">
    <title>MeteoSpark</title>
  </head>

  <body class="bg-gradient-to-r from-green-200 to-cyan-200 flex items-center justify-center min-h-screen font-sans text-slate-800">

    <div id="auth-block" class="w-full max-w-md p-8 bg-slate-200 w-full rounded-xl max-w-d p-5 bg-gray-200 shadow-lg mx-4">

      <div class="text-center mb-8">
        <h1 class="text-[50px] font-bold text-green-800 mb-2">MeteoSpark</h1>
        <p class="text-[20px] text-black">Learn about weather. Time to spark!</p>
      </div>

      <form id="auth-form" class="space-y-3" onsubmit="event.preventDefault();">

        <div>
          <label for="email" class="block text-sm font-medium text-slate-700 mb-1">Email</label>
          <input type="email" id="email" required 
            class="w-full px-4 py-2 border border-slate-900 rounded-lg focus:ring-2 outline-none transition-all" 
            placeholder="hello@example.com">
        </div>

        <div>
          <label for="password" class="block text-sm font-medium text-slate-700 mb-1">Password</label>
          <input type="password" id="password" required 
            class="w-full px-4 py-2 border border-slate-900 rounded-lg focus:ring-2 outline-none transition-all" 
            placeholder="••••••••">
        </div>

        <div class="flex flex-col gap-3 pt-4">
          <button id="btnLogin" type="button" class="text-[20px] px-8 py-4 bg-gradient-to-r from-green-500 to-cyan-500 text-white font-bold rounded-full transition-transform transform-gpu hover:-translate-y-1 hover:shadow-lg">Sign In</button>
          
          <div class="relative flex py-2 items-center">
            <div class="flex-grow border-t border-slate-200"></div>
            <span class="flex-shrink-0 mx-4 text-slate-400 text-[20px]">If you don't have an account, then..</span>
            <div class="flex-grow border-t border-slate-200"></div>
          </div>

          <button id="btnRegister" type="button" class="text-[20px] px-8 py-4 bg-gradient-to-r from-green-500 to-cyan-500 text-white font-bold rounded-full transition-transform transform-gpu hover:-translate-y-1 hover:shadow-lg">Create an Account</button>
        </div>

      </form>
    </div>

    <div id="dashboard-container" class="hidden w-full max-w-4xl p-8">
      <h1 class="text-3xl font-bold text-black">Welcome to MeteoSpark Dashboard</h1>
      <p id="emailDisplay" class="text-slate-500 mt-2"></p>
      <button id="btnLogout" class="mt-6 bg-red-500 text-white px-4 py-2 rounded-lg hover:bg-red-600">Sign Out</button>
    </div>

    <script type="module" src="/src/main.js"></script>

  </body>


</html>
